---
# Local CI: repository-specific build, vet, unit tests, acceptance tests,
# and coverage. Linting is handled by ci_checks.yml (reusable_ci.yml /
# MegaLinter). Security and vulnerability scans by ci_security.yml.
name: Local CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Run acceptance tests
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo@v2.29.0
          ginkgo -v acceptance/

      - name: Coverage
        if: matrix.go-version == '1.26'
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1
